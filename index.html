<!DOCTYPE html>
<html>
<head>
<title>AI FAQ Chatbot</title>

<style>

body{
background:#1e1e2f;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.chatbox{
width:500px;
background:white;
padding:20px;
border-radius:20px;
}

#messages{
height:350px;
overflow:auto;
border:1px solid gray;
padding:10px;
margin-bottom:15px;
}

input{
width:75%;
padding:10px;
}

button{
padding:10px;
}

</style>

</head>
<body>

<div class="chatbox">

<h2>AI FAQ Chatbot</h2>

<div id="messages"></div>

<input type="text" id="message">

<button onclick="sendMessage()">Send</button>

</div>

<script>

async function sendMessage(){

let msg=document.getElementById("message").value;

let response=await fetch("/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({message:msg})
});

let data=await response.json();

document.getElementById("messages").innerHTML +=
"<p><b>You:</b> "+msg+"</p>";

document.getElementById("messages").innerHTML +=
"<p><b>Bot:</b> "+data.reply+"</p>";

document.getElementById("message").value="";
}

</script>

</body>
</html>
